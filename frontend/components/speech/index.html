<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>html,body{margin:0;padding:0;height:0;overflow:hidden;}</style>
</head>
<body>
<script>
// Streamlit component low-level protocol (no JS lib needed)
function post(type, payload) {
  window.parent.postMessage(Object.assign({ isStreamlitMessage: true, type }, payload), "*");
}

post("streamlit:componentReady", { apiVersion: 1 });
post("streamlit:setFrameHeight", { height: 0 });

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SR) {
  post("streamlit:setComponentValue", { value: { error: "not_supported", text: "" } });
} else {
  const rec = new SR();
  rec.continuous     = true;
  rec.interimResults = true;
  rec.lang           = "en-US";

  let final = "";
  let debounce;
  let shouldRun = false;
  let isRecording = false;

  function send(text) {
    clearTimeout(debounce);
    debounce = setTimeout(() => {
      post("streamlit:setComponentValue", { value: { text, final_text: final, listening: isRecording } });
    }, 150);
  }

  function startRecording() {
    if (!shouldRun || isRecording) return;
    try {
      rec.start();
    } catch (error) {
      if (error && error.name !== "InvalidStateError") {
        post("streamlit:setComponentValue", {
          value: { error: error.name || "start_failed", text: final, listening: false }
        });
      }
    }
  }

  function stopRecording() {
    if (!isRecording) return;
    try {
      rec.stop();
    } catch (_) {}
  }

  rec.onstart = () => {
    isRecording = true;
    post("streamlit:setComponentValue", { value: { text: final, final_text: final, listening: true } });
  };

  rec.onresult = (e) => {
    let interim = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript + " ";
      else interim += e.results[i][0].transcript;
    }
    send(final + interim);
  };

  // Restart automatically after silence timeout
  rec.onend = () => {
    isRecording = false;
    if (shouldRun) startRecording();
  };

  rec.onerror = (e) => {
    isRecording = false;
    if (e.error !== "no-speech" && !(e.error === "aborted" && !shouldRun)) {
      post("streamlit:setComponentValue", { value: { error: e.error, text: final, listening: false } });
    }
  };

  window.addEventListener("message", (event) => {
    const message = event.data;
    if (!message || message.type !== "streamlit:render") return;

    post("streamlit:setFrameHeight", { height: 0 });

    const args = message.args || {};
    const nextShouldRun = Boolean(args.active);

    if (nextShouldRun && !shouldRun) {
      final = "";
      send("");
    }

    shouldRun = nextShouldRun;

    if (shouldRun) startRecording();
    else stopRecording();
  });
}
</script>
</body>
</html>
